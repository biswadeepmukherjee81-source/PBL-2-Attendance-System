<!DOCTYPE html>
<html>
<head>
    <title>Blockchain Attendance System</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #eef2f3, #8e9eab);
            text-align: center;
            margin: 0;
        }

        .header {
            background: #2c3e50;
            color: white;
            padding: 20px;
        }

        .container {
            margin-top: 30px;
        }

        .btn {
            padding: 12px 20px;
            margin: 10px;
            border: none;
            border-radius: 6px;
            background: #3498db;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .btn:hover {
            background: #2980b9;
        }

        .card {
            background: white;
            width: 340px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }

        input, select {
            width: 90%;
            padding: 8px;
            margin: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        footer {
            margin-top: 40px;
            padding: 10px;
            background: #2c3e50;
            color: white;
        }
    </style>
</head>

<body>

<div class="header">
    <h1>Blockchain Attendance System</h1>
    <p>End Term (ETE) – Automated Analytics</p>
</div>

<div class="container">
    <button class="btn" onclick="openPPT()">View PPT</button>
</div>

<!-- Attendance Form -->
<div class="card">
    <h3>Mark Attendance</h3>

    <input type="number" id="roll" placeholder="Enter Roll Number">

    <input type="text" id="name" placeholder="Enter Name">

    <input type="text" id="subject" placeholder="Enter Subject">

    <select id="status">
        <option value="true">Present</option>
        <option value="false">Absent</option>
    </select>

    <button class="btn" onclick="mark()">Submit</button>

    <p id="result"></p>
</div>

<!-- Percentage Section -->
<div class="card">
    <h3>Check Attendance Percentage</h3>

    <input type="number" id="checkRoll" placeholder="Enter Roll Number">

    <button class="btn" onclick="showPercentage()">Get Percentage</button>

    <p id="percentage"></p>
</div>

<footer>
    <p>PBL-2 Project | Blockchain Attendance System</p>
</footer>

<script>

// Open PPT
function openPPT() {
    window.open("ppt.pptx");
}

// Mark Attendance (Frontend Demo)
function mark() {
    let roll = document.getElementById("roll").value;
    let name = document.getElementById("name").value;
    let subject = document.getElementById("subject").value;
    let status = document.getElementById("status").value;

    if (roll === "" || name === "" || subject === "") {
        alert("Please fill all fields");
        return;
    }

    document.getElementById("result").innerText =
        "Roll " + roll + " (" + name + ") marked " +
        (status === "true" ? "Present" : "Absent") +
        " in " + subject;
}

// Show Percentage (Demo)
function showPercentage() {
    let roll = document.getElementById("checkRoll").value;

    if (roll === "") {
        alert("Enter roll number");
        return;
    }

    document.getElementById("percentage").innerText =
        "Percentage calculated using smart contract logic (demo)";
}

</script>

</body>
</html>
